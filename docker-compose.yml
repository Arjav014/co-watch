services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cowatch-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: change-me-in-production
      MONGO_URI: mongodb://mongo:27017/cowatch
      REDIS_URL: redis://redis:6379
      ROOM_ACTIVE_TTL_SECONDS: 21600
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: cowatch-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cowatch-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
